<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupollo - Página no encontrada</title>
    <link rel="stylesheet" href="tailwind-build.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1">
</head>
<body class="bg-brandBlack font-montserrat overflow-x-hidden flex flex-col min-h-screen text-white">

    <nav class="w-full z-50 flex items-center justify-center p-6 border-b-2 border-brandGold/30 bg-brandBlack/90 backdrop-blur-md">
        <a href="index.html" class="logo-anim">
            <img src="img/PNG sin fondo.png" alt="Grupollo" class="h-16 w-auto brightness-200">
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center relative bg-mundial-geometric py-20 px-6">
        <div class="container mx-auto max-w-7xl grid grid-cols-1 md:grid-cols-2 gap-16 md:gap-8 items-center z-10">

            <div class="text-left flex flex-col justify-center items-start">

                <div class="font-black text-brandGold mascota-neon-glow leading-none tracking-tighter" style="font-size: clamp(6rem, 15vw, 12rem); filter: drop-shadow(0 0 20px rgba(242, 181, 15, 0.4));">
                    404
                </div>

                <div class="w-32 h-1.5 rounded-full mb-8" style="background: linear-gradient(90deg, var(--color-gold), var(--color-red));"></div>

                <h1 class="text-2xl md:text-3xl font-black mb-4 uppercase tracking-widest text-white drop-shadow-md">
                    ¡Ups! El pollo se escapó
                </h1>

                <p class="text-gray-400 text-lg md:text-xl max-w-md mb-10 leading-relaxed font-medium">
                    La página que buscas no está en nuestro corral. Es posible que el enlace esté roto o haya sido movido.
                </p>

                <a href="index.html" class="inline-flex items-center gap-3 px-10 py-5 bg-brandGold text-brandBlack font-black rounded-full hover:bg-brandRed hover:text-white transition-all duration-300 uppercase text-sm tracking-wider shadow-[0_0_20px_rgba(242,181,15,0.3)] hover:shadow-[0_0_30px_rgba(227,30,36,0.5)] transform hover:-translate-y-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Volver al Inicio
                </a>
            </div>

            <div class="not-found-3d-scene w-full h-[400px] md:h-full flex items-center justify-center">
                <div class="not-found-3d-stack-wrapper font-black uppercase tracking-widest leading-none text-center" style="font-size: clamp(2.5rem, 5vw, 4.5rem);">

                    <div class="not-found-layer-3d not-found-layer-back-2">
                        PÁGINA<br>NO<br>ENCONTRADA
                    </div>

                    <div class="not-found-layer-3d not-found-layer-back-1">
                        PÁGINA<br>NO<br>ENCONTRADA
                    </div>

                    <div class="not-found-layer-3d not-found-layer-middle-2">
                        PÁGINA<br>NO<br>ENCONTRADA
                    </div>

                    <div class="not-found-layer-3d not-found-layer-middle-1">
                        PÁGINA<br>NO<br>ENCONTRADA
                    </div>

                    <div class="not-found-layer-3d not-found-layer-front">
                        <span class="text-white">PÁGINA</span><br>
                        <span class="text-white">NO</span><br>
                        <span class="text-brandGold drop-shadow-[0_0_15px_rgba(242,181,15,0.6)]">ENCONTRADA</span>
                    </div>

                </div>
            </div>

        </div>
    </main>
</body>
</html>
